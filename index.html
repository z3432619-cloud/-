<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>斗地主人机对战</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main id="table" class="table">
      <section class="topbar">
        <div class="brand">
          <h1>斗地主</h1>
          <p id="status">准备开始新牌局</p>
        </div>
        <div class="top-actions">
          <span id="accountName" class="account-chip">游客</span>
          <button id="accountButton" class="ghost">登录</button>
          <button id="rankButton" class="ghost">排行榜</button>
          <button id="newGame" class="ghost">新牌局</button>
        </div>
      </section>

      <section class="opponents">
        <article id="ai1Panel" class="player">
          <div class="player-meta">
            <strong>左手 AI</strong>
            <span id="ai1Role">农民</span>
          </div>
          <div class="count"><span id="ai1Count">17</span> 张</div>
          <div id="ai1Last" class="last-play"></div>
        </article>

        <article id="ai2Panel" class="player">
          <div class="player-meta">
            <strong>右手 AI</strong>
            <span id="ai2Role">农民</span>
          </div>
          <div class="count"><span id="ai2Count">17</span> 张</div>
          <div id="ai2Last" class="last-play"></div>
        </article>
      </section>

      <section class="center">
        <div class="kitty-wrap">
          <span>底牌</span>
          <div id="kitty" class="kitty"></div>
        </div>
        <div id="deckPile" class="deck-pile" aria-hidden="true">
          <div class="card back"></div>
          <div class="card back"></div>
          <div class="card back"></div>
        </div>
        <div id="lastPlayBox" class="last-box">
          <span>当前牌型</span>
          <strong id="lastSummary">无</strong>
        </div>
      </section>

      <section id="bidding" class="actions hidden">
        <button id="bidYes" class="primary">叫地主</button>
        <button id="bidNo">不叫</button>
      </section>

      <section class="human-wrap">
        <article id="humanPanel" class="player human">
          <div class="player-meta">
            <strong>你</strong>
            <span id="humanRole">农民</span>
          </div>
          <div id="humanLast" class="last-play"></div>
        </article>

        <div id="hand" class="hand" aria-label="你的手牌"></div>

        <div id="playActions" class="actions">
          <button id="hint">提示</button>
          <button id="play" class="primary">出牌</button>
          <button id="pass">不要</button>
        </div>
      </section>

      <div id="dealLayer" class="deal-layer" aria-hidden="true"></div>
    </main>

    <dialog id="accountDialog" class="modal">
      <form method="dialog" class="modal-card" id="accountForm">
        <div class="modal-head">
          <h2 id="accountTitle">登录账号</h2>
          <button id="closeAccount" class="icon-btn" value="cancel" type="button">×</button>
        </div>
        <label>
          用户名
          <input id="username" autocomplete="username" maxlength="16" required />
        </label>
        <label>
          密码
          <input id="password" type="password" autocomplete="current-password" minlength="4" required />
        </label>
        <label id="confirmWrap" class="hidden">
          确认密码
          <input id="confirmPassword" type="password" autocomplete="new-password" minlength="4" />
        </label>
        <p id="accountMessage" class="form-message"></p>
        <div class="modal-actions">
          <button id="toggleAccountMode" type="button">去注册</button>
          <button id="submitAccount" class="primary" type="submit">登录</button>
        </div>
      </form>
    </dialog>

    <dialog id="rankDialog" class="modal">
      <section class="modal-card rank-card">
        <div class="modal-head">
          <h2>排行榜</h2>
          <button id="closeRank" class="icon-btn" type="button">×</button>
        </div>
        <div class="rank-tabs">
          <button class="rank-tab active" data-rank="wins">胜场</button>
          <button class="rank-tab" data-rank="rate">胜率</button>
          <button class="rank-tab" data-rank="streak">连胜</button>
        </div>
        <div id="rankList" class="rank-list"></div>
      </section>
    </dialog>

    <script src="app.js"></script>
  </body>
</html>
